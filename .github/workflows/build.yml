name: Build

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      release:
        description: 'Release'
        type: boolean
        required: true
        default: false
      lspatch:
        description: 'LSPatch'
        type: boolean
        required: true
        default: false

jobs:

  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release context
        id: ctx
        run: |
          release_version=$(grep -m1 '^##[[:space:]]' UpdateHistory.md | sed -E 's/^##[[:space:]]+//' | tr -d '[:space:]')
          if [ -z "$release_version" ]; then
            echo "ERROR: failed to extract version from UpdateHistory.md (expected a leading '## <version>' heading)"
            exit 1
          fi
          tag="v${release_version}"

          do_release=false
          if [ "${{ github.event.inputs.release }}" == "true" ]; then
            do_release=true
          elif [ "${{ github.event_name }}" == "push" ] && [ "${{ github.ref }}" == "refs/heads/main" ]; then
            if git ls-remote --tags origin "refs/tags/${tag}" | grep -q "refs/tags/${tag}$"; then
              echo "Tag ${tag} already exists on origin. Skipping release."
            else
              do_release=true
            fi
          fi

          {
            echo "release_version=${release_version}"
            echo "tag=${tag}"
            echo "do_release=${do_release}"
            echo "repo=${GITHUB_REPOSITORY#${GITHUB_REPOSITORY_OWNER}/}"
            echo "commit=$(echo ${{ github.sha }} | cut -c-7)"
          } >> "$GITHUB_OUTPUT"

          echo "release_version=${release_version} tag=${tag} do_release=${do_release}"

      - name: Build release notes from UpdateHistory.md
        if: steps.ctx.outputs.do_release == 'true'
        run: |
          # 先頭の "## " セクション本文（見出し行は除く、次の "## " の手前まで）を抽出
          awk '/^## /{ if (seen) exit; seen=1; next } seen { print }' UpdateHistory.md > release_notes_body.md
          {
            echo ""
            echo "## パッチ配布対象の LINE バージョン"
            jq -r '.[] | "- LINE \(.line_version) (\(.abi))"' .github/line-targets.json
            echo ""
            echo "> 上記はプリパッチ APK を同梱した LINE のバージョンです。モジュール自体の動作対応範囲は app/src/main/java/io/github/hiro/lime/hooks/Constants.java を参照してください。"
            echo ""
            echo "### 差分"
            echo "https://github.com/${{ github.repository }}/compare/${{ steps.ctx.outputs.tag }}^...${{ steps.ctx.outputs.tag }}"
          } >> release_notes_body.md

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Release check
        if: steps.ctx.outputs.do_release == 'true'
        run: |
          if [ "${{ secrets.STORE_FILE }}" == "" ]; then
            echo -e "\nERROR!\nTo release, you need to set up a signing key!\n"
            echo "STORE_FILE: A Base64 encoded string of the signing key in JKS format"
            echo "STORE_PASSWORD: Key store password"
            echo "KEY_ALIAS: Key alias"
            echo "KEY_PASSWORD: Key password"
            echo ""
            exit 1
          fi

      - name: Apply release version to build.gradle
        if: steps.ctx.outputs.do_release == 'true'
        run: |
          version_code=$((116161 + ${{ github.run_number }}))
          sed -i -E "s/versionCode[[:space:]]+[0-9]+/versionCode ${version_code}/" app/build.gradle
          sed -i -E "s/versionName[[:space:]]+\"[^\"]*\"/versionName \"${{ steps.ctx.outputs.release_version }}\"/" app/build.gradle
          grep -E 'versionCode|versionName' app/build.gradle

      - name: Build with Gradle
        run: |
          if [ "${{ steps.ctx.outputs.do_release }}" == "true" ]; then
            echo "${{ secrets.STORE_FILE }}" | base64 -d > app/release.jks
            export STORE_PASSWORD="${{ secrets.STORE_PASSWORD }}"
            export KEY_ALIAS="${{ secrets.KEY_ALIAS }}"
            export KEY_PASSWORD="${{ secrets.KEY_PASSWORD }}"
            ./gradlew assembleRelease --no-daemon --stacktrace
            cp -f app/build/outputs/apk/release/app-release.apk "${{ steps.ctx.outputs.repo }}-${{ steps.ctx.outputs.tag }}.apk"
          else
            ./gradlew assembleDebug --no-daemon --stacktrace
          fi

      - name: Download LSPatch
        if: steps.ctx.outputs.do_release == 'true'
        run: curl -L -o lspatch.jar https://github.com/JingMatrix/LSPatch/releases/download/v0.7/lspatch.jar

      - name: Patch LINE APKs
        if: steps.ctx.outputs.do_release == 'true'
        run: |
          module_apk="${{ steps.ctx.outputs.repo }}-${{ steps.ctx.outputs.tag }}.apk"
          jq -c '.[]' .github/line-targets.json | while read -r entry; do
            url=$(echo "$entry" | jq -r '.download_url')
            local_name=$(echo "$entry" | jq -r '.local_name')

            echo "Downloading ${local_name} from ${url}"
            curl -L -o "$local_name" "$url"

            echo "Patching ${local_name} ..."
            rm -f ./*-lspatched.apk
            java -jar lspatch.jar "$local_name" -m "$module_apk" -l 2 -v

            patched=$(ls ./*-lspatched.apk 2>/dev/null | head -n1)
            if [ -z "$patched" ]; then
              echo "ERROR: lspatch produced no output for ${local_name}"
              exit 1
            fi
            mv "$patched" "Patched_${{ steps.ctx.outputs.tag }}_${local_name}"
          done
          echo "Patched artifacts:"
          ls -l Patched_* || true

      - name: Upload module (Debug)
        uses: actions/upload-artifact@v4
        if: steps.ctx.outputs.do_release != 'true'
        with:
          name: ${{ steps.ctx.outputs.repo }}-${{ steps.ctx.outputs.release_version }}@${{ steps.ctx.outputs.commit }}
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Release
        uses: softprops/action-gh-release@v2
        if: steps.ctx.outputs.do_release == 'true'
        with:
          tag_name: ${{ steps.ctx.outputs.tag }}
          body_path: release_notes_body.md
          files: |
            ${{ steps.ctx.outputs.repo }}-${{ steps.ctx.outputs.tag }}.apk
            Patched_${{ steps.ctx.outputs.tag }}_*.apk
